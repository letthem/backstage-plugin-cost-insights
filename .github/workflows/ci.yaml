name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.4.1 --activate

      - name: Get yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: yarn-${{ matrix.node-version }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-${{ matrix.node-version }}-
            yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint:all

      - name: Generate type declarations
        run: yarn tsc

      - name: Type check
        run: yarn tsc:full

      - name: Build
        run: yarn build:all

  verify-package:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Setup Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.4.1 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate type declarations
        run: yarn tsc

      - name: Build packages
        run: yarn build:all

      - name: Verify frontend package
        run: |
          cd plugins/cost-insights
          yarn pack --dry-run

      - name: Verify backend package
        run: |
          cd plugins/cost-insights-backend
          yarn pack --dry-run
